    difficulty: medium
    prerequisites: [26-todo-tool]
    description_md_path: modules/27-plan-mode/instructions.md
  - slug: 28-project-memory
    track: 6-planning-memory
    name: "Project Memory"
    difficulty: medium
    description: "Auto-discover CLAUDE.md / AGENTS.md / SOUL.md / CONVENTIONS.md / .cursorrules / copilot-instructions.md with dedup and byte budget."
    prerequisites: [27-plan-mode]
    description_md_path: modules/28-project-memory/instructions.md
  - slug: 29-persistent-session-memory
    track: 6-planning-memory
    name: "Persistent Session Memory"
    difficulty: medium
    prerequisites: [28-project-memory]
    description_md_path: modules/29-persistent-session-memory/instructions.md
  - slug: 30-skills
    track: 6-planning-memory
    name: "Skills"
    difficulty: medium
    description: "Discover and invoke skills (packaged instructions + tool whitelists) as virtual tools."
    prerequisites: [29-persistent-session-memory]
    description_md_path: modules/30-skills/instructions.md

  # Track 7 — Advanced
  - slug: 31-subagents-task-tool
    track: 7-advanced
    name: "Subagents (Task Tool)"
    difficulty: hard
    prerequisites: [30-skills]
    description_md_path: modules/31-subagents-task-tool/instructions.md
  - slug: 32-agent-teams
    track: 7-advanced
    name: "Agent Teams"
    difficulty: hard
    description: "A team of workers sharing a TODO list and message bus; parent drains and aggregates."
    prerequisites: [31-subagents-task-tool]
    description_md_path: modules/32-agent-teams/instructions.md
  - slug: 33-hooks
    track: 7-advanced
    name: "Hooks"
    difficulty: hard
    prerequisites: [32-agent-teams]
    description_md_path: modules/33-hooks/instructions.md
  - slug: 34-mcp-client
    track: 7-advanced
    name: "MCP Client"
    difficulty: hard
    prerequisites: [33-hooks]
    description_md_path: modules/34-mcp-client/instructions.md
  - slug: 35-mcp-server
    track: 7-advanced
    name: "MCP Server"
    difficulty: hard
    prerequisites: [34-mcp-client]
    description_md_path: modules/35-mcp-server/instructions.md
  - slug: 36-sandbox-exec
    track: 7-advanced
    name: "Sandbox Exec"
    difficulty: very_hard
    prerequisites: [35-mcp-server]
    description_md_path: modules/36-sandbox-exec/instructions.md

  # Track 8 — Production
  - slug: 37-cost-tracking
    track: 8-production
    name: "Cost Tracking"
    difficulty: easy
    prerequisites: [36-sandbox-exec]
    description_md_path: modules/37-cost-tracking/instructions.md
  - slug: 38-compaction
    track: 8-production
    name: "Compaction"
    difficulty: hard
    prerequisites: [37-cost-tracking]
    description_md_path: modules/38-compaction/instructions.md
  - slug: 39-capstone
    track: 8-production
    name: "Capstone"
    difficulty: very_hard
    milestone: true
    description: "End-to-end: 10 realistic coding tasks against a real or recorded provider."
    prerequisites: [38-compaction]
    description_md_path: modules/39-capstone/instructions.md

# Cohort cadence (informational — used by tools/generate_curriculum.py to populate
# the "Locked status" table). Modify per cohort.
cadence:
  modules_per_week: 3
  total_weeks: 14
  release_schedule:
    - week: 1
      tracks: [0-setup, 1-llm-plumbing]
    - week: 2
      tracks: [2-tool-foundations]
    - week: 3
      tracks: [3-file-ops]
    - weeks: [4, 5]
      tracks: [4-agent-ux]
    - weeks: [6, 7]
      tracks: [5-robustness]
    - weeks: [8, 9, 10]
      tracks: [6-planning-memory]
    - weeks: [11, 12]
      tracks: [7-advanced]
    - weeks: [13, 14]
      tracks: [8-production]
