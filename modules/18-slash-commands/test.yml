module: 18-slash-commands
description: "Module 18 — slash commands"
prerequisites: [17]

setup:
  workspace: fresh
  # copy_fixtures:
  #   - {from: "fixtures/projects/...", to: "./"}

env:
  LLM_PROVIDER: mock
  # MOCK_LLM_FIXTURE: "fixtures/llm/18-slash-commands.json"

tests:
