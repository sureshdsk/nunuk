    type: agent-prompt
    prompt: "In code.py, rename the variable foo to bar"
    timeout_seconds: 30
    assertions:
      # TODO: replace with assertions matching file_contains code.py 'bar'; file_absent_text code.py 'foo'
      - {type: exit_code, equals: 0}
