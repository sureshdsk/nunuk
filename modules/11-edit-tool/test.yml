module: 11-edit-tool
description: "Module 11 — edit tool"
prerequisites: [10]

setup:
  workspace: fresh
  # copy_fixtures:
  #   - {from: "fixtures/projects/...", to: "./"}

env:
  LLM_PROVIDER: mock
  # MOCK_LLM_FIXTURE: "fixtures/llm/11-edit-tool.json"

tests:
