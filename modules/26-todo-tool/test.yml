module: 26-todo-tool
description: "Module 26 — todo tool"
prerequisites: [25]

setup:
  workspace: fresh
  # copy_fixtures:
  #   - {from: "fixtures/projects/...", to: "./"}

env:
  LLM_PROVIDER: mock
  # MOCK_LLM_FIXTURE: "fixtures/llm/26-todo-tool.json"

tests:
