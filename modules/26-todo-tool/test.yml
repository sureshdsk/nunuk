    type: agent-prompt
    prompt: "Plan a 3-step refactor and track progress"
    timeout_seconds: 30
    assertions:
      # TODO: replace with assertions matching tool_call_sequence has multiple TodoWrite calls; stdout shows todo state
      - {type: exit_code, equals: 0}
