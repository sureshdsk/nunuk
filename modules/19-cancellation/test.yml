module: 19-cancellation
description: "Module 19 — cancellation"
prerequisites: [18]

setup:
  workspace: fresh
  # copy_fixtures:
  #   - {from: "fixtures/projects/...", to: "./"}

env:
  LLM_PROVIDER: mock
  # MOCK_LLM_FIXTURE: "fixtures/llm/19-cancellation.json"

tests:
  - name: "SIGINT cancels stream"
    type: repl-session
    turns:
      # TODO: list turns; each {send: "...", assert_contains: "..."} optionally followed by /exit
      - send: "hello"
      - send: "/exit"
    assertions:
      - {type: exit_code, equals: 0}
